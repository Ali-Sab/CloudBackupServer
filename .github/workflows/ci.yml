name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:

  # ---- Backend unit tests (no external services needed) --------------------
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test -v -race ./...

  # ---- Frontend unit tests (Jest) -----------------------------------------
  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        working-directory: frontend
        run: npm test -- --ci

  # ---- Backend integration tests (needs Postgres) -------------------------
  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudbackup
          POSTGRES_USER: cloudbackup
          POSTGRES_PASSWORD: cloudbackup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudbackup -d cloudbackup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://cloudbackup:cloudbackup_test@localhost:5432/cloudbackup?sslmode=disable
        run: go test -v -race -tags integration ./...

  # ---- E2E tests (Electron + Playwright, needs Postgres + MinIO) -----------
  e2e:
    name: E2E tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudbackup
          POSTGRES_USER: cloudbackup
          POSTGRES_PASSWORD: cloudbackup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudbackup -d cloudbackup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install MinIO client and create bucket
        run: |
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb local/cloudbackup

      - name: Build backend
        working-directory: backend
        run: go build -o ../server ./cmd/server

      - name: Start backend
        env:
          DATABASE_URL: postgres://cloudbackup:cloudbackup_test@localhost:5432/cloudbackup?sslmode=disable
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: cloudbackup
          MINIO_USE_SSL: "false"
          JWT_SECRET: e2e-test-secret-key
          PORT: "8080"
        run: |
          ./server &
          echo $! > server.pid
          # wait for server to be ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/api/health && break
            sleep 1
          done

      - name: Register shared E2E test user
        run: |
          RESP=$(curl -sf -X POST http://localhost:8080/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"e2e@test.example","password":"E2eTestPass1!"}')
          echo "E2E_TEST_EMAIL=e2e@test.example" >> $GITHUB_ENV
          echo "E2E_TEST_PASSWORD=E2eTestPass1!" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright system dependencies
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          API_BASE_URL: http://localhost:8080
          E2E_TEST_EMAIL: ${{ env.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ env.E2E_TEST_PASSWORD }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
