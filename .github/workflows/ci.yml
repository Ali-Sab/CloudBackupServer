name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:

  # ---- Backend unit tests (no external services needed) --------------------
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test -v -race ./...

  # ---- Frontend unit tests (Jest) -----------------------------------------
  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        working-directory: frontend
        run: npm test -- --ci

  # ---- Backend integration tests (needs Postgres) -------------------------
  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudbackup
          POSTGRES_USER: cloudbackup
          POSTGRES_PASSWORD: cloudbackup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudbackup -d cloudbackup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://cloudbackup:cloudbackup_test@localhost:5432/cloudbackup?sslmode=disable
        run: go test -v -race -tags integration ./...
