openapi: 3.0.3
info:
  title: Cloud Backup Server API
  description: |
    REST API for the Cloud Backup Server.

    ## Authentication

    This API uses a **two-token** scheme with **HttpOnly cookie delivery** as the primary
    transport (preferred for browser and Electron clients):

    - **Access token** — short-lived JWT (1 minute). Set as the `access_token` HttpOnly cookie
      (`SameSite=Lax`, `Path=/`). Also accepted as `Authorization: Bearer <token>` for
      non-browser clients (e.g. Electron) that cannot use cookies.
    - **Refresh token** — long-lived opaque token (30 days). Set as the `refresh_token` HttpOnly
      cookie (`SameSite=Lax`, `Path=/api/auth/refresh`). Can also be sent in the JSON request body
      for clients that cannot use cookies. Only the SHA-256 hash is stored in the database; the
      raw token is never persisted.

    Tokens are also returned in the JSON response body on login/register/refresh for clients
    that cannot use cookies (e.g. Electron from a `file://` origin). Insomnia users should
    rely on the cookie jar instead — run login once and all requests are authenticated automatically.

    ### Token rotation
    Every call to `/api/auth/refresh` issues a *new* refresh token and revokes the old one.
    If a revoked refresh token is presented, all sessions for that user are immediately revoked
    (theft detection).

    ### Password reset (development)
    `/api/auth/forgot-password` currently returns `reset_token` directly in the response body
    and returns a 404 when the email is not found (anti-enumeration is disabled).
    Both behaviours will be reversed before production: the token will be delivered by email
    and the response will look identical regardless of whether the email exists.
  version: 0.3.3
  license:
    name: GNU General Public License v3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development server

# Global default: every protected endpoint requires CookieAuth (or BearerAuth as fallback).
security:
  - CookieAuth: []
  - BearerAuth: []

tags:
  - name: Health
    description: Server health and readiness
  - name: Auth
    description: Authentication, session management, and password reset
  - name: Folders
    description: Watched folder management — list, add, remove (requires auth)
  - name: Files
    description: Per-folder file list management (requires auth)
  - name: Backup
    description: Per-folder file content upload and download (requires auth)
  - name: Account
    description: Account management — change email, change password, delete account (requires auth)

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "0.3.0"

  /api/session:
    get:
      summary: Get current session state
      description: |
        Returns whether the caller is authenticated. Always returns 200 — missing or
        invalid access tokens yield `{logged_in: false}` rather than an error.
      operationId: getSession
      tags: [Auth]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
              examples:
                loggedOut:
                  summary: Not authenticated
                  value: {logged_in: false}
                loggedIn:
                  summary: Authenticated
                  value:
                    logged_in: true
                    user: {id: 1, email: alice@example.com}

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful — returns token pair and sets auth cookies
          headers:
            Set-Cookie:
              description: |
                Two cookies are set:
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — returns token pair and sets auth cookies
          headers:
            Set-Cookie:
              description: |
                Two cookies are set:
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      summary: Rotate the refresh token and obtain a new token pair
      description: |
        Accepts a valid refresh token and returns a new access token and refresh token.
        The old refresh token is immediately revoked (rotation).

        **Theft detection**: if a previously-revoked refresh token is presented, all active
        sessions for that user are revoked.

        The refresh token can be provided via the `refresh_token` cookie **or** in the JSON
        request body. The request body is optional when the cookie is present.
      operationId: refreshTokens
      tags: [Auth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued and cookies rotated
          headers:
            Set-Cookie:
              description: |
                Rotated cookies (old tokens revoked):
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      summary: Revoke the provided refresh token
      description: |
        Revokes the caller's refresh token. Idempotent — succeeds even if the token is
        already revoked or not found.
      operationId: logout
      tags: [Auth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out (refresh token revoked)
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/forgot-password:
    post:
      summary: Request a password reset token
      description: |
        Generates a single-use password reset token (1 hour TTL).

        **Development only**: anti-enumeration is disabled — a 404 is returned when the
        email is not found. `reset_token` is returned directly in the response body.
      operationId: forgotPassword
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset token issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No account found with that email (dev only)

  /api/auth/reset-password:
    post:
      summary: Reset password using a reset token
      operationId: resetPassword
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password updated successfully. Please log in again."
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/folders:
    get:
      summary: List all watched folders with stats
      description: Returns all watched folders for the authenticated user, each with aggregate stats (file count, total size, last backup time).
      operationId: getFolders
      tags: [Folders]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Folder list with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add a new watched folder
      description: Creates a new watched folder for the authenticated user. Multiple folders per user are supported.
      operationId: addFolder
      tags: [Folders]
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFolderRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/folders/{folderID}:
    parameters:
      - name: folderID
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Watched folder ID
    put:
      summary: Rename a watched folder
      operationId: renameFolder
      tags: [Folders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: My Documents
      responses:
        "204":
          description: Folder renamed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a watched folder
      description: |
        Removes a watched folder and all its backed-up objects from object storage.
        The `watched_files` and `file_backups` rows are cascade-deleted via the DB FK.
        Storage deletions are best-effort.
      operationId: deleteFolder
      tags: [Folders]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "204":
          description: Folder deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/folders/{folderID}/files:
    parameters:
      - name: folderID
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get the stored file list for a folder
      operationId: getFolderFiles
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Stored file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedFilesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/folders/{folderID}/sync:
    parameters:
      - name: folderID
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      summary: Replace the stored file list for a folder
      description: |
        Atomically replaces the entire stored file list for the folder.
        The incoming `files` array is the complete current state — not a delta.
      operationId: syncFolderFiles
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncWatchedFilesRequest"
      responses:
        "204":
          description: File list replaced successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/folders/{folderID}/backups:
    parameters:
      - name: folderID
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: List all backed-up files for a folder
      operationId: listFolderBackups
      tags: [Backup]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Backup records
          content:
            application/json:
              schema:
                type: object
                required: [backups]
                properties:
                  backups:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileBackupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/folders/{folderID}/versions:
    get:
      summary: List all preserved versions of a file
      operationId: getFileVersions
      tags: [Versions]
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: folderID
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: path
          in: query
          required: true
          schema: { type: string }
          description: POSIX relative path of the file (e.g. "photos/img.jpg")
      responses:
        "200":
          description: List of versions, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileVersionsResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/folders/{folderID}/versions/{versionID}:
    get:
      summary: Download a specific file version
      operationId: getFileVersionDownload
      tags: [Versions]
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: folderID
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: versionID
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Raw file bytes for the requested version
          headers:
            X-Backup-Version:  { schema: { type: integer } }
            X-Checksum-SHA256: { schema: { type: string } }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/folders/{folderID}/backup/{relative_path}:
    parameters:
      - name: folderID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: relative_path
        in: path
        required: true
        schema:
          type: string
        description: |
          POSIX-style path relative to the watched root (e.g. `photos/2024/img.jpg`).
          Each segment is percent-encoded; slashes are preserved. Must not contain `..`.
        example: photos/2024/img.jpg
    put:
      summary: Upload a file for backup
      description: |
        Streams the request body into object storage.

        **Deduplication:** if the `X-Checksum-SHA256` header matches the stored checksum
        for this path, the upload is skipped and `skipped: true` is returned.
      operationId: uploadFolderFile
      tags: [Backup]
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: X-Checksum-SHA256
          in: header
          required: true
          schema:
            type: string
          description: Hex-encoded SHA-256 of the file bytes.
        - name: X-File-Size
          in: header
          required: true
          schema:
            type: integer
          description: Exact byte count of the file.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload complete (or skipped — see `skipped` field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadFileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Storage or database failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Download a backed-up file
      description: Streams the backed-up file bytes from object storage.
      operationId: downloadFolderFile
      tags: [Backup]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: File bytes
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="<name>"'
            Content-Length:
              schema:
                type: integer
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: DB record exists but the object is missing from storage (orphaned record)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/account/email:
    put:
      summary: Change email address
      operationId: changeEmail
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailRequest"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/account/password:
    put:
      summary: Change password while logged in
      description: Requires the current password. Revokes all other sessions on success.
      operationId: changePassword
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password updated; all other sessions revoked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/account:
    delete:
      summary: Permanently delete account and all data
      description: Requires the current password. All folders, backups, and storage objects are deleted.
      operationId: deleteAccount
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "204":
          description: Account deleted; auth cookies cleared
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/history:
    get:
      summary: Get backup activity history
      description: |
        Returns file backup records sorted by `backed_up_at` DESC, enriched with the
        parent folder name and path. Supports filtering by folder and pagination.
      operationId: getBackupHistory
      tags: [History]
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: folder_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter to a specific folder (omit for all folders)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Number of items to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of items to skip (for pagination)
      responses:
        "200":
          description: Paginated history items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        **Primary auth mechanism.** HttpOnly `access_token` cookie (SameSite=Lax, 1 minute TTL)
        set automatically by login/register/refresh. Insomnia captures it via the cookie jar.
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Fallback for clients that cannot use cookies (e.g. Electron from a file:// origin).
        Pass the `access_token` value from the login response body as `Authorization: Bearer <token>`.

  schemas:
    FileVersion:
      type: object
      required: [id, version, size, checksum_sha256, object_key, backed_up_at]
      properties:
        id:             { type: integer, format: int64 }
        version:        { type: integer }
        size:           { type: integer, format: int64 }
        checksum_sha256: { type: string }
        object_key:     { type: string }
        backed_up_at:   { type: string, format: date-time }

    FileVersionsResponse:
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/FileVersion"

    HistoryItem:
      type: object
      required: [id, user_id, watched_path_id, relative_path, size, checksum_sha256, object_key, backed_up_at, version, folder_name, folder_path]
      properties:
        id:          { type: integer, format: int64 }
        user_id:     { type: integer, format: int64 }
        watched_path_id: { type: integer, format: int64 }
        relative_path:   { type: string, example: "photos/2024/img.jpg" }
        size:        { type: integer, format: int64 }
        checksum_sha256: { type: string }
        object_key:  { type: string }
        backed_up_at: { type: string, format: date-time }
        version:     { type: integer }
        folder_name: { type: string }
        folder_path: { type: string }

    HistoryResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HistoryItem"
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.3.0

    SessionResponse:
      type: object
      required: [logged_in]
      properties:
        logged_in:
          type: boolean
        user:
          $ref: "#/components/schemas/UserInfo"
          nullable: true

    UserInfo:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com

    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: JWT access token (expires in 1 minute)
        refresh_token:
          type: string
          description: Opaque refresh token (expires in 30 days)
        user:
          $ref: "#/components/schemas/UserInfo"

    RefreshResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: New JWT access token (expires in 1 minute)
        refresh_token:
          type: string
          description: New opaque refresh token (expires in 30 days; old token revoked)
        user:
          $ref: "#/components/schemas/UserInfo"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Optional when sending the refresh_token cookie.

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Optional — used by clients that cannot send cookies.

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com

    ForgotPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "If the account exists, a reset token has been issued."
        reset_token:
          type: string
          description: "DEV ONLY — will be removed when email delivery is added"
        _dev_note:
          type: string

    ResetPasswordRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          format: password

    AddFolderRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the local directory to watch
          example: /home/user/documents
        name:
          type: string
          description: User-visible label (defaults to last path segment if omitted)
          example: Documents

    FolderResponse:
      type: object
      required: [id, path, name, created_at]
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
          example: /home/user/documents
        name:
          type: string
          example: Documents
        created_at:
          type: string
          format: date-time

    FolderStats:
      type: object
      required: [id, path, name, file_count, total_size_bytes]
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
          example: /home/user/documents
        name:
          type: string
          example: Documents
        file_count:
          type: integer
          example: 42
        total_size_bytes:
          type: integer
          format: int64
          example: 104857600
        last_backed_up_at:
          type: string
          format: date-time
          nullable: true
          description: Null when no files have been backed up yet

    FolderStatsResponse:
      type: object
      required: [folders]
      properties:
        folders:
          type: array
          items:
            $ref: "#/components/schemas/FolderStats"

    FileEntry:
      type: object
      required: [name, relative_path, is_directory, size, modified_ms]
      properties:
        name:
          type: string
          example: img.jpg
        relative_path:
          type: string
          example: photos/2024/img.jpg
          description: POSIX path relative to the watched root.
        is_directory:
          type: boolean
        size:
          type: integer
          format: int64
        modified_ms:
          type: integer
          format: int64
          description: Last-modified timestamp in milliseconds since Unix epoch

    WatchedFile:
      allOf:
        - $ref: "#/components/schemas/FileEntry"
        - type: object
          required: [id, path_id, created_at]
          properties:
            id:
              type: integer
              format: int64
            path_id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time

    SyncWatchedFilesRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
          description: Complete current state of the watched directory (not a delta)

    WatchedFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/WatchedFile"

    FileBackupRecord:
      type: object
      required: [id, watched_path_id, relative_path, size, checksum_sha256, backed_up_at, version]
      properties:
        id:
          type: integer
          format: int64
        watched_path_id:
          type: integer
          format: int64
        relative_path:
          type: string
          example: photos/2024/img.jpg
        size:
          type: integer
          format: int64
        checksum_sha256:
          type: string
        backed_up_at:
          type: string
          format: date-time
        version:
          type: integer
          example: 2

    UploadFileResponse:
      type: object
      required: [relative_path, size, checksum_sha256, backed_up_at, version, skipped]
      properties:
        relative_path:
          type: string
          example: photos/2024/img.jpg
        size:
          type: integer
          format: int64
        checksum_sha256:
          type: string
        backed_up_at:
          type: string
          format: date-time
        version:
          type: integer
          description: Increments on each content change; unchanged on a skipped upload.
          example: 3
        skipped:
          type: boolean
          description: true when the checksum matched and no upload occurred

    ChangeEmailRequest:
      type: object
      required: [new_email, current_password]
      properties:
        new_email:
          type: string
          format: email
        current_password:
          type: string
          format: password

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    DeleteAccountRequest:
      type: object
      required: [current_password]
      properties:
        current_password:
          type: string
          format: password

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

  responses:
    BadRequest:
      description: Invalid request body or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists (duplicate email)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
