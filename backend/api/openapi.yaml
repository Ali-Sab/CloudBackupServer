openapi: 3.0.3
info:
  title: Cloud Backup Server API
  description: |
    REST API for the Cloud Backup Server.

    ## Authentication

    This API uses a **two-token** scheme:

    - **Access token** — short-lived JWT (1 minute). Include as `Authorization: Bearer <token>`.
    - **Refresh token** — long-lived opaque token (30 days). Sent to `/api/auth/refresh` to
      obtain a new token pair without re-entering credentials. Only the SHA-256 hash is stored
      in the database; the raw token is never persisted.

    ### Token rotation
    Every call to `/api/auth/refresh` issues a *new* refresh token and revokes the old one.
    If a revoked refresh token is presented, all sessions for that user are immediately revoked
    (theft detection).

    ### Password reset (development)
    `/api/auth/forgot-password` currently returns `reset_token` directly in the response body.
    This is a **development convenience** — in production the token will be delivered by email
    and omitted from the response.
  version: 0.2.0
  license:
    name: GNU General Public License v3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Server health and readiness
  - name: Auth
    description: Authentication, session management, and password reset
  - name: Files
    description: Watched directory path and file list management (requires auth)

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: 0.2.0

  /api/session:
    get:
      summary: Get current session state
      description: |
        Returns whether the caller is authenticated. Always returns 200 — missing or
        invalid access tokens yield `{logged_in: false}` rather than an error.
      operationId: getSession
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
              examples:
                loggedOut:
                  summary: Not authenticated
                  value: {logged_in: false}
                loggedIn:
                  summary: Authenticated
                  value:
                    logged_in: true
                    user: {id: 1, email: alice@example.com}

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful — returns token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — returns token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      summary: Rotate the refresh token and obtain a new token pair
      description: |
        Accepts a valid refresh token and returns a new access token and refresh token.
        The old refresh token is immediately revoked (rotation).

        **Theft detection**: if a previously-revoked refresh token is presented, all active
        sessions for that user are revoked.
      operationId: refreshTokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      summary: Revoke the provided refresh token
      description: |
        Revokes a specific refresh token. Idempotent — succeeds even if the token is
        already revoked or not found.

        The access token is intentionally not required — this allows logout even when
        the access token has already expired.
      operationId: logout
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out (refresh token revoked)
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/forgot-password:
    post:
      summary: Request a password reset token
      description: |
        Generates a single-use password reset token (1 hour TTL).

        The response deliberately looks identical whether or not the email exists,
        to prevent email enumeration.

        **Development only**: `reset_token` is currently returned in the response body.
        In production this field will be removed and the token delivered by email.
      operationId: forgotPassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset token issued (or email not found — response is the same)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/reset-password:
    post:
      summary: Reset password using a reset token
      description: |
        Validates the reset token, updates the user's password, marks the token as used,
        and revokes all active refresh tokens for that user (forcing re-login everywhere).
      operationId: resetPassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password updated successfully. Please log in again."
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/files/path:
    get:
      summary: Get the user's watched directory path
      description: Returns the authenticated user's saved watched directory path.
      operationId: getWatchedPath
      tags: [Files]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Watched path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedPathResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Set or update the user's watched directory path
      description: |
        Creates or replaces the authenticated user's watched directory path.
        Each user has at most one watched path — this upserts it.
      operationId: setWatchedPath
      tags: [Files]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetWatchedPathRequest"
      responses:
        "200":
          description: Watched path saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedPathResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files/:
    get:
      summary: Get the stored file list for the user's watched path
      description: |
        Returns all files and directories last synced for the user's watched path.
        Returns 404 if no watched path has been set.
      operationId: getFiles
      tags: [Files]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Stored file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedFilesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/files/sync:
    put:
      summary: Replace the stored file list
      description: |
        Atomically replaces the entire stored file list for the user's watched path.
        The incoming `files` array is the complete current state of the directory —
        not a delta. Returns 404 if no watched path has been set.
      operationId: syncFiles
      tags: [Files]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncWatchedFilesRequest"
      responses:
        "204":
          description: File list replaced successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived access token (1 minute TTL)

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.2.0

    SessionResponse:
      type: object
      required: [logged_in]
      properties:
        logged_in:
          type: boolean
        user:
          $ref: "#/components/schemas/UserInfo"
          nullable: true

    UserInfo:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com

    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: JWT access token (expires in 1 minute)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          description: Opaque refresh token (expires in 30 days)
          example: dGhpcyBpcyBhIHJhbmRvbSB0b2tlbg==
        user:
          $ref: "#/components/schemas/UserInfo"

    RefreshResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: New JWT access token (expires in 1 minute)
        refresh_token:
          type: string
          description: New opaque refresh token (expires in 30 days; old token revoked)
        user:
          $ref: "#/components/schemas/UserInfo"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: The opaque refresh token previously issued by login or register

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: The refresh token to revoke

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com

    ForgotPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "If the account exists, a reset token has been issued."
        reset_token:
          type: string
          description: "DEV ONLY — will be removed when email delivery is added"
          example: dGhpcyBpcyBhIHJhbmRvbSB0b2tlbg==
        _dev_note:
          type: string

    ResetPasswordRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          format: password

    SetWatchedPathRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the local directory to watch
          example: /home/user/documents

    WatchedPathResponse:
      type: object
      required: [id, path, updated_at]
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
          example: /home/user/documents
        updated_at:
          type: string
          format: date-time

    FileEntry:
      type: object
      required: [name, relative_path, is_directory, size, modified_ms]
      properties:
        name:
          type: string
          example: img.jpg
          description: Bare filename or directory name (no path separators)
        relative_path:
          type: string
          example: photos/2024/img.jpg
          description: |
            POSIX path relative to the watched root directory.
            Top-level entries have relative_path equal to name.
            Subdirectory entries use forward-slash separators, e.g. "src/main.go".
        is_directory:
          type: boolean
        size:
          type: integer
          format: int64
          description: File size in bytes (0 for directories)
        modified_ms:
          type: integer
          format: int64
          description: Last-modified timestamp in milliseconds since Unix epoch

    WatchedFile:
      allOf:
        - $ref: "#/components/schemas/FileEntry"
        - type: object
          required: [id, path_id, created_at]
          properties:
            id:
              type: integer
              format: int64
            path_id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time

    SyncWatchedFilesRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
          description: Complete current state of the watched directory (not a delta)

    WatchedFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/WatchedFile"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

  responses:
    BadRequest:
      description: Invalid request body or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists (duplicate email)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
