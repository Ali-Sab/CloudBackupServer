openapi: 3.0.3
info:
  title: Cloud Backup Server API
  description: |
    REST API for the Cloud Backup Server.

    ## Authentication

    This API uses a **two-token** scheme with **HttpOnly cookie delivery** as the primary
    transport (preferred for browser and Electron clients):

    - **Access token** — short-lived JWT (1 minute). Set as the `access_token` HttpOnly cookie
      (`SameSite=Lax`, `Path=/`). Also accepted as `Authorization: Bearer <token>` for
      non-browser clients (e.g. Electron) that cannot use cookies.
    - **Refresh token** — long-lived opaque token (30 days). Set as the `refresh_token` HttpOnly
      cookie (`SameSite=Lax`, `Path=/api/auth/refresh`). Can also be sent in the JSON request body
      for clients that cannot use cookies. Only the SHA-256 hash is stored in the database; the
      raw token is never persisted.

    Tokens are also returned in the JSON response body on login/register/refresh for clients
    that cannot use cookies (e.g. Electron from a `file://` origin). Insomnia users should
    rely on the cookie jar instead — run login once and all requests are authenticated automatically.

    ### Token rotation
    Every call to `/api/auth/refresh` issues a *new* refresh token and revokes the old one.
    If a revoked refresh token is presented, all sessions for that user are immediately revoked
    (theft detection).

    ### Password reset (development)
    `/api/auth/forgot-password` currently returns `reset_token` directly in the response body
    and returns a 404 when the email is not found (anti-enumeration is disabled).
    Both behaviours will be reversed before production: the token will be delivered by email
    and the response will look identical regardless of whether the email exists.
  version: 0.2.7
  license:
    name: GNU General Public License v3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development server

# Global default: every protected endpoint requires CookieAuth (or BearerAuth as fallback).
# Insomnia applies the first listed scheme automatically on import and uses the cookie jar
# to capture the access_token set by login/register/refresh.
security:
  - CookieAuth: []
  - BearerAuth: []

tags:
  - name: Health
    description: Server health and readiness
  - name: Auth
    description: Authentication, session management, and password reset
  - name: Files
    description: Watched directory path and file list management (requires auth)
  - name: Backup
    description: File content upload and download (requires auth)

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: 0.2.0

  /api/session:
    get:
      summary: Get current session state
      description: |
        Returns whether the caller is authenticated. Always returns 200 — missing or
        invalid access tokens yield `{logged_in: false}` rather than an error.
      operationId: getSession
      tags: [Auth]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
              examples:
                loggedOut:
                  summary: Not authenticated
                  value: {logged_in: false}
                loggedIn:
                  summary: Authenticated
                  value:
                    logged_in: true
                    user: {id: 1, email: alice@example.com}

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful — returns token pair and sets auth cookies
          headers:
            Set-Cookie:
              description: |
                Two cookies are set:
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — returns token pair and sets auth cookies
          headers:
            Set-Cookie:
              description: |
                Two cookies are set:
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      summary: Rotate the refresh token and obtain a new token pair
      description: |
        Accepts a valid refresh token and returns a new access token and refresh token.
        The old refresh token is immediately revoked (rotation).

        **Theft detection**: if a previously-revoked refresh token is presented, all active
        sessions for that user are revoked.

        The refresh token can be provided via the `refresh_token` cookie **or** in the JSON
        request body. The request body is optional when the cookie is present.
      operationId: refreshTokens
      tags: [Auth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued and cookies rotated
          headers:
            Set-Cookie:
              description: |
                Rotated cookies (old tokens revoked):
                `access_token=<jwt>; HttpOnly; SameSite=Lax; Path=/` (1 min TTL)
                `refresh_token=<token>; HttpOnly; SameSite=Lax; Path=/api/auth/refresh` (30 day TTL)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      summary: Revoke the provided refresh token
      description: |
        Revokes the caller's refresh token. Idempotent — succeeds even if the token is
        already revoked or not found.

        The access token is intentionally not required — this allows logout even when
        the access token has already expired.

        The refresh token can be provided via the `refresh_token` cookie **or** in the JSON
        request body. Both are optional — if neither is present the endpoint still returns 204
        (nothing to revoke).
      operationId: logout
      tags: [Auth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out (refresh token revoked)
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/forgot-password:
    post:
      summary: Request a password reset token
      description: |
        Generates a single-use password reset token (1 hour TTL).

        **Development only**: anti-enumeration is disabled — a 404 is returned when the
        email is not found so misconfigured test accounts are easy to spot. Re-enable
        the generic response before shipping to production.

        `reset_token` is returned directly in the response body for development convenience.
        In production this field will be removed and the token delivered by email.
      operationId: forgotPassword
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset token issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No account found with that email (dev only — will become a generic 200 in production)

  /api/auth/reset-password:
    post:
      summary: Reset password using a reset token
      description: |
        Validates the reset token, updates the user's password, marks the token as used,
        and revokes all active refresh tokens for that user (forcing re-login everywhere).
      operationId: resetPassword
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password updated successfully. Please log in again."
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/files/path:
    get:
      summary: Get the user's watched directory path
      description: Returns the authenticated user's saved watched directory path.
      operationId: getWatchedPath
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Watched path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedPathResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Set or update the user's watched directory path
      description: |
        Creates or replaces the authenticated user's watched directory path.
        Each user has at most one watched path — this upserts it.

        **Side effect on path change:** if the new path differs from the previous one, all
        backed-up file objects and `file_backups` DB records for this user are deleted.
        Both deletions are best-effort (failures are logged but not surfaced to the client).
      operationId: setWatchedPath
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetWatchedPathRequest"
      responses:
        "200":
          description: Watched path saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedPathResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files/:
    get:
      summary: Get the stored file list for the user's watched path
      description: |
        Returns all files and directories last synced for the user's watched path.
        Returns 404 if no watched path has been set.
      operationId: getFiles
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Stored file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedFilesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/files/sync:
    put:
      summary: Replace the stored file list
      description: |
        Atomically replaces the entire stored file list for the user's watched path.
        The incoming `files` array is the complete current state of the directory —
        not a delta. Returns 404 if no watched path has been set.
      operationId: syncFiles
      tags: [Files]
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncWatchedFilesRequest"
      responses:
        "204":
          description: File list replaced successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/files/backup/{relative_path}:
    parameters:
      - name: relative_path
        in: path
        required: true
        schema:
          type: string
        description: |
          POSIX-style path relative to the watched root (e.g. `photos/2024/img.jpg`).
          Each segment is percent-encoded; slashes are preserved.
          Must not contain `..`.
        example: photos/2024/img.jpg
    put:
      summary: Upload a file for backup
      description: |
        Streams the request body into object storage.

        **Deduplication:** if the `X-Checksum-SHA256` header matches the stored checksum
        for this path, the upload is skipped and `skipped: true` is returned — the body
        is never read. This makes repeated syncs efficient for unchanged files.

        When the watched path changes, all backed-up content is automatically deleted.
      operationId: uploadFile
      tags: [Backup]
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - name: X-Checksum-SHA256
          in: header
          required: true
          schema:
            type: string
          description: Hex-encoded SHA-256 of the file bytes.
          example: a1b2c3d4e5f6...
        - name: X-File-Size
          in: header
          required: true
          schema:
            type: integer
          description: Exact byte count of the file. Used for the DB record and response.
          example: 204800
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload complete (or skipped — see `skipped` field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadFileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Storage or database failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Download a backed-up file
      description: Streams the backed-up file bytes from object storage.
      operationId: downloadFile
      tags: [Backup]
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: File bytes
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="<name>"'
            Content-Length:
              schema:
                type: integer
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: DB record exists but the object is missing from storage (orphaned record)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        **Primary auth mechanism.** HttpOnly `access_token` cookie (SameSite=Lax, 1 minute TTL)
        set automatically by login/register/refresh. Insomnia captures it via the cookie jar —
        enable "Send Cookies" and run POST /api/auth/login first; all subsequent requests are
        authenticated automatically.
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Fallback for clients that cannot use cookies (e.g. Electron from a file:// origin).
        Pass the `access_token` value from the login response body as `Authorization: Bearer <token>`.

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.2.0

    SessionResponse:
      type: object
      required: [logged_in]
      properties:
        logged_in:
          type: boolean
        user:
          $ref: "#/components/schemas/UserInfo"
          nullable: true

    UserInfo:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com

    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: JWT access token (expires in 1 minute)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          description: Opaque refresh token (expires in 30 days)
          example: dGhpcyBpcyBhIHJhbmRvbSB0b2tlbg==
        user:
          $ref: "#/components/schemas/UserInfo"

    RefreshResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
          description: New JWT access token (expires in 1 minute)
        refresh_token:
          type: string
          description: New opaque refresh token (expires in 30 days; old token revoked)
        user:
          $ref: "#/components/schemas/UserInfo"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: |
            The opaque refresh token previously issued by login or register.
            Optional when sending the refresh_token cookie (cookie takes precedence).

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: |
            The refresh token to revoke. Optional — used by clients that cannot send cookies
            (e.g. Electron from a file:// origin). Browser clients rely on the cookie instead.

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com

    ForgotPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "If the account exists, a reset token has been issued."
        reset_token:
          type: string
          description: "DEV ONLY — will be removed when email delivery is added"
          example: dGhpcyBpcyBhIHJhbmRvbSB0b2tlbg==
        _dev_note:
          type: string

    ResetPasswordRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          format: password

    SetWatchedPathRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the local directory to watch
          example: /home/user/documents

    WatchedPathResponse:
      type: object
      required: [id, path, updated_at]
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
          example: /home/user/documents
        updated_at:
          type: string
          format: date-time

    FileEntry:
      type: object
      required: [name, relative_path, is_directory, size, modified_ms]
      properties:
        name:
          type: string
          example: img.jpg
          description: Bare filename or directory name (no path separators)
        relative_path:
          type: string
          example: photos/2024/img.jpg
          description: |
            POSIX path relative to the watched root directory.
            Top-level entries have relative_path equal to name.
            Subdirectory entries use forward-slash separators, e.g. "src/main.go".
        is_directory:
          type: boolean
        size:
          type: integer
          format: int64
          description: File size in bytes (0 for directories)
        modified_ms:
          type: integer
          format: int64
          description: Last-modified timestamp in milliseconds since Unix epoch

    WatchedFile:
      allOf:
        - $ref: "#/components/schemas/FileEntry"
        - type: object
          required: [id, path_id, created_at]
          properties:
            id:
              type: integer
              format: int64
            path_id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time

    SyncWatchedFilesRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
          description: Complete current state of the watched directory (not a delta)

    WatchedFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/WatchedFile"

    UploadFileResponse:
      type: object
      required: [relative_path, size, checksum_sha256, backed_up_at, version, skipped]
      properties:
        relative_path:
          type: string
          example: photos/2024/img.jpg
        size:
          type: integer
          format: int64
          description: File size in bytes
          example: 3145728
        checksum_sha256:
          type: string
          description: Hex-encoded SHA-256 provided by the client
          example: a1b2c3d4e5f6...
        backed_up_at:
          type: string
          format: date-time
          example: "2026-04-10T14:32:00Z"
        version:
          type: integer
          description: |
            Monotonically increasing counter for this file. Starts at 1 on the first
            backup; increments by 1 each time the file content changes and is re-uploaded.
            Unchanged on a skipped upload.
          example: 3
        skipped:
          type: boolean
          description: true when the checksum matched and no upload occurred

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

  responses:
    BadRequest:
      description: Invalid request body or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists (duplicate email)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
