<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content-Security-Policy:
      - script-src 'self'  → only load scripts from the same origin
      - connect-src        → allow XHR/fetch to the local backend only
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src http://localhost:8080"
  />
  <title>Cloud Backup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Cloud Backup</h1>
    </header>

    <main class="app-main">
      <div id="session-status" class="card loading">
        <p>Connecting to server…</p>
      </div>
      <div id="file-browser" class="hidden"></div>
    </main>
  </div>

  <script src="api-client.js"></script>
  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script src="files.js"></script>
  <script src="app.js"></script>
</body>
</html>
