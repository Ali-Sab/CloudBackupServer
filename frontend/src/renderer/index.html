<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content-Security-Policy:
      - script-src 'self'  → only load scripts from the same origin
      - connect-src        → allow XHR/fetch to the local backend only
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://localhost:8080; img-src 'self' blob: data:; object-src blob:; frame-src blob:"
  />
  <title>Cloud Backup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Cloud Backup</h1>
      <div id="header-user" class="header-user hidden">
        <div id="header-avatar" class="header-avatar"></div>
        <span id="header-email" class="header-email"></span>
        <button id="account-nav-btn" class="header-icon-btn" title="Account" aria-label="Account settings">👤</button>
        <button id="settings-nav-btn" class="header-icon-btn" title="Settings" aria-label="Settings">⚙️</button>
        <button id="logout-btn" class="header-signout">Sign Out</button>
      </div>
    </header>

    <main class="app-main">
      <div id="session-status" class="card loading">
        <p>Connecting to server…</p>
      </div>
      <div id="dashboard" class="hidden"></div>
      <div id="file-browser" class="hidden"></div>
      <div id="account" class="hidden"></div>
      <div id="settings" class="hidden"></div>
    </main>
  </div>

  <script src="api-client.js"></script>
  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
  <script src="files.js"></script>
  <script src="account.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
