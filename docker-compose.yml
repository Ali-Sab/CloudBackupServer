version: "3.8"

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudbackup
      POSTGRES_USER: cloudbackup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudbackup_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudbackup -d cloudbackup"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---- Go backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cloudbackup:${POSTGRES_PASSWORD:-cloudbackup_dev}@postgres:5432/cloudbackup?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: ${BACKEND_PORT:-8080}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
